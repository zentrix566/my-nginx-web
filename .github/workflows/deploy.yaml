name: Docker Build and Dynamic Deploy

on:
  push:
    branches: [ "main" ]  # 只有 main 分支提交时触发
  schedule:
    # - cron: '0 22 * * *'  # 每天北京时间早上 6 点自动运行 (UTC 22:00)
  workflow_dispatch:      # 允许手动在 GitHub 页面点击运行

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 2. 运行注入脚本，修改 status.html 的内容
      - name: Inject Secrets into Config and HTML
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        run: |
          if [ -z "$SERVER_IP" ] || [ -z "$DEEPSEEK_KEY" ]; then
            echo "❌ Error: Secrets not set"
            exit 1
          fi
          # 注入 nginx.conf (sed 替换占位符)
          # 假设 nginx.conf 里用的是 ${SERVER_IP}，我们可以继续用 envsubst 
          # 但为了保险，也可以在 nginx.conf 里用 __SERVER_IP__
          envsubst '${SERVER_IP}' < nginx.conf > nginx.conf.tmp && mv nginx.conf.tmp nginx.conf
          
          # 💡 核心改动：使用 sed 替换 html 中的占位符
          # -i 表示直接修改文件，s/旧/新/g 是替换指令
          sed -i "s/aaa/${DEEPSEEK_KEY}/g" web/ai_debug.html
          
          echo "✅ Successfully injected Secrets using sed"
      # 3. 登录到 GitHub 镜像仓库 (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 构建镜像并推送到仓库
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # 5. 通过 SSH 登录服务器并通知 K3s 重启 Pod
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          # 这里同样使用 Secret
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # 强制 K3s 重新拉取最新的镜像并重启 Pod
            kubectl rollout restart deployment my-nginx
